# Two Netlify sites can use this repo on the same branch:
# - Shared: API_URL + Stripe (below). Optional: override per site in Netlify UI.
# - Storefront mode: set NEXT_PUBLIC_ORDER_SITE + NEXT_PUBLIC_SITE_TITLE in the UI,
#   OR name the site so scripts/netlify-build.cjs can infer (Plug Power if the site
#   name contains plugpower / plug-power / plug_power; otherwise main + default titles).

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # PROD config (the prod Netlify sites git-build from this file). Live backend +
  # live publishable key must be paired — staging values live in netlify.toml.staging.
  NEXT_PUBLIC_API_URL = "https://frese-bakery-backend-app-eqjx4stexa-ue.a.run.app/api"
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY = "pk_live_51KasQqEZvpspKOfSzW7sdVtBJmH1pVuJ7MkqdkFvwMqH1FG2RkSdpI5qDqEzsxeNgUOwODddzocbKqlRu90DAnMA00Y537FNq1"

# Ensure .well-known directory is served correctly for Apple Pay verification
[[redirects]]
  from = "/.well-known/*"
  to = "/.well-known/:splat"
  status = 200
  force = false

