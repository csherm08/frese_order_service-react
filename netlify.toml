# Two Netlify sites can use this repo on the same branch:
# - Shared: API_URL + Stripe (below). Optional: override per site in Netlify UI.
# - Storefront mode: set NEXT_PUBLIC_ORDER_SITE + NEXT_PUBLIC_SITE_TITLE in the UI,
#   OR name the site so scripts/netlify-build.cjs can infer (Plug Power if the site
#   name contains plugpower / plug-power / plug_power; otherwise main + default titles).

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NEXT_PUBLIC_API_URL = "https://frese-bakery-backend-app-staging-eqjx4stexa-ue.a.run.app/api"
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY = "pk_test_51KasQqEZvpspKOfSlXnGLRy8IxkOOIZfo5bSREuWGPiK4HCkRyPaSy3m6TqFll4shlG3czSvOiE6eeUEUBG4Ueat00nSgYii4r"

# Ensure .well-known directory is served correctly for Apple Pay verification
[[redirects]]
  from = "/.well-known/*"
  to = "/.well-known/:splat"
  status = 200
  force = false

